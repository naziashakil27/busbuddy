<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BusBuddy – Smart Bus Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      background: #1a73e8;
      color: #fff;
      padding: 16px 24px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    #chat-container {
      width: 100%;
      max-width: 700px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 12px;
      overflow-y: auto;
      margin-top: 10px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .user-msg {
      background: #1a73e8;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .bot-msg {
      background: #ffffff;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .typing {
      background: #fff;
      color: #999;
      align-self: flex-start;
      border-radius: 18px;
      padding: 10px 16px;
      font-style: italic;
      font-size: 0.88rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    #input-area {
      width: 100%;
      max-width: 700px;
      display: flex;
      padding: 12px 16px;
      gap: 10px;
      background: #fff;
      border-top: 1px solid #dde1e7;
      position: sticky;
      bottom: 0;
    }

    #user-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ccc;
      border-radius: 24px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
    }

    #user-input:focus { border-color: #1a73e8; }

    #send-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 12px 22px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #1558b0; }
  </style>
</head>
<body>

<header>🚍 BusBuddy – Smart Bus Assistant</header>

<div id="chat-container">
  <div class="message bot-msg">Hi! I'm BusBuddy 👋 Ask me about bus fares, routes, or anything about Surat's bus service.</div>
</div>

<div id="input-area">
  <input type="text" id="user-input" placeholder="e.g. fare from Adajan to Vesu" autocomplete="off"/>
  <button id="send-btn">Send</button>
</div>

<script>
  const chatContainer = document.getElementById('chat-container');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  function appendMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'message ' + (sender === 'user' ? 'user-msg' : 'bot-msg');
    div.textContent = text;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing-indicator';
    div.textContent = 'BusBuddy is typing…';
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const msg = userInput.value.trim();
    if (!msg) return;

    appendMessage(msg, 'user');
    userInput.value = '';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      removeTyping();
      appendMessage(data.response, 'bot');
    } catch (err) {
      removeTyping();
      appendMessage('Sorry, something went wrong. Please try again.', 'bot');
    } finally {
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>

</body>
</html>
